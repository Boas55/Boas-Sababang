<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Masuk</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{{ url_for('index') }}">
        <img src="{{ url_for('static', filename='logo.svg') }}" alt="Logo" class="logo">
        <span>Boas Sababang</span>
      </a>
    </div>
  </header>
  <main class="auth">
    <div class="container">
      <form method="post" class="card form">
        <h1>Masuk</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash">
              {% for category, message in messages %}
                <div class="flash-item {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        <label for="password">Kata Sandi</label>
        <input id="password" name="password" type="password" placeholder="Masukkan kata sandi" required minlength="4">
        <button class="btn primary" type="submit">Masuk</button>
      </form>
    </div>
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>© {{ 2026 }} Boas Sababang</p>
    </div>
  </footer>
</body>
</html>
